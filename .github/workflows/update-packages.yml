name: 'Update packages'

on:
  schedule:
    # Runs every three hours at 01:00, 04:00, 07:00, 10:00, 13:00, 16:00, 19:00, and 22:00 UTC daily.
    - cron: '0 1,4,7,10,13,16,19,22 * * *'

  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GITHUB_TOKEN: "${{ secrets.TOKEN }}"

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          repository: "${{ github.repository }}"
          token: "${{ env.GITHUB_TOKEN }}"

      - name: 'Install Nix'
        uses: cachix/install-nix-action@v31

      - name: 'Update package versions'
        shell: bash
        run: |
          BOLD_GREEN='\e[1;32m'
          echo -e "${BOLD_GREEN}Creating a new environment with helper programs"
          echo '> nix flake update --verbose'
          nix flake update --verbose
          echo '> nix develop --command bash ./scripts/update-package-versions.sh'
          nix develop --command bash ./scripts/update-package-versions.sh

      - name: 'Commit changes'
        shell: bash
        run: |
          echo "> USERNAME='github-actions[bot]'"
          USERNAME='github-actions[bot]'
          echo "> EMAIL='41898282+github-actions[bot]@users.noreply.github.com'"
          EMAIL='41898282+github-actions[bot]@users.noreply.github.com'
          echo '> git config --local user.name "$USERNAME"'
          git config --local user.name "$USERNAME"
          echo '> git config --local user.email "$EMAIL"'
          git config --local user.email "$EMAIL"
          echo '> git add -u'
          git add -u
          # Get the list of staged files
          STAGED_FILES="$(git diff --cached --name-only)"

          if [ -n "$STAGED_FILES" ]; then
            echo "> commit_message=''"
            commit_message=''

            # Check if only flake.lock was updated
            if [ "$STAGED_FILES" == 'flake.lock' ]; then
              echo "> commit_message='bot: Updated \`flake.lock\`'"
              commit_message='bot: Updated `flake.lock`'
            else
              echo "> CURRENT_TIME=\"\$(date +'%Y-%m-%d %H:%M:%S')\""
              CURRENT_TIME="$(date +'%Y-%m-%d %H:%M:%S')"
              echo '> commit_message="bot: Updated packages at $CURRENT_TIME UTC [skip ci]"'
              commit_message="bot: Updated packages at $CURRENT_TIME UTC [skip ci]"
            fi

            echo '> git commit -m "$commit_message"'
            git commit -m "$commit_message"
          fi

      - name: 'Push changes'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: "${{ env.GITHUB_TOKEN }}"
          branch: "${{ github.ref }}"
